{% extends "base.html" %}

{% block title %}Reset Password — Music Bank{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>🔐 Reset Password</h1>
        <p class="auth-sub">Enter your new password.</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth/reset-password" class="auth-form">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label for="password">New Password (min 8 characters)</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-full">Reset Password</button>
        </form>

        <p class="auth-alt"><a href="/auth/login">Back to Login</a></p>
    </div>
</div>
{% endblock %}
