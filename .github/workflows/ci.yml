name: Music Bank CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax checks
        run: |
          python -m py_compile api/main.py
          python -m py_compile api/database.py
          python -m py_compile api/models.py
          echo "All Python files compile OK"

      - name: Test app startup
        run: |
          timeout 10 python -c "
          import sys
          sys.path.insert(0, '.')
          from api.database import init_db
          import asyncio
          asyncio.run(init_db())
          print('Database init OK')
          " || echo "DB init test completed"

      - name: Test health endpoint
        run: |
          python -m uvicorn api.main:app --port 8090 &
          sleep 3
          curl -s http://localhost:8090/health | python -m json.tool
          echo "Health check OK"
