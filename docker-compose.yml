version: '3.8'

services:
  music-bank:
    build: .
    container_name: music-bank
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
      - ./static/audio:/app/static/audio
      - ./Caddyfile:/app/Caddyfile:ro
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: music-bank-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - music-bank
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
